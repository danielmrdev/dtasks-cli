name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: dtasks-macos-arm64
          - goos: darwin
            goarch: amd64
            artifact: dtasks-macos-amd64
          - goos: linux
            goarch: amd64
            artifact: dtasks-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: dtasks-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: dtasks-windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            artifact: dtasks-windows-arm64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ${{ matrix.artifact }}${{ matrix.ext }} \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 1

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            dist/*
